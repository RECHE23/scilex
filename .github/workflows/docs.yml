name: Docs

# Build the Doxygen API reference (with the embedded coverage report and the
# guided tour) and publish it to GitHub Pages on every push to the default branch.
# Enable Pages once in the repository settings with "GitHub Actions" as the source.
# SciLex compiles against REAL's headers, so REAL is checked out as a sibling
# (mirroring ci.yml) for the coverage build that `make doc` runs.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; supersede an in-flight run with the latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-regex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/sciforge
          ref: v2026.6.1
          path: sciforge
      - name: Install Doxygen, Graphviz, Clang and LLVM coverage tools
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz clang llvm
      - name: Generate the API reference (Doxygen + embedded coverage + guided tour)
        run: make -C scilex doc
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: scilex/build/doc/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
