name: CI

# SciLex depends on REAL's headers. CI checks out REAL (public) as a sibling so
# the Makefile's default resolution (../real-regex/include) finds it — no secret needed.
#
# Actions-minute economy (this is a private repo, so minutes are billed, and macOS
# runners bill 10x): macOS is the maintainer's local development platform — every gate
# runs there via `make full-local-gate` on each slice — so CI deliberately omits macOS
# and covers the *non-local* platforms instead: Linux (clang + g++-14), Windows/MSVC
# and ARM. Run on main only (plus PRs); workflow_dispatch is available for ad-hoc runs.
# Doc-only pushes are skipped. Coverage is a local gate (Apple-clang llvm-cov); not here.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
  workflow_dispatch:

jobs:
  # Lint (format + MISRA) via SciForge's reusable spine: pins clang-tidy-18 and runs
  # this repo's make format-check / misra against the shared lint/ config. SciLex's
  # MISRA TU needs REAL's headers, so real-regex is checked out as a dep sibling.
  lint:
    uses: RECHE23/sciforge/.github/workflows/lint-cpp.yml@v2026.6.2
    with:
      deps: '[{"repo":"RECHE23/real-regex","path":"real-regex"}]'
      sciforge-ref: v2026.6.2
      runner-mode: hosted

  # POSIX developer workflow: the Makefile, both compilers, plus sanitizers.
  posix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cxx: g++-14 }
          - { os: ubuntu-latest, cxx: clang++ }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-regex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/sciforge
          ref: v2026.6.2
          path: sciforge
      - name: Test
        run: make -C scilex test CXX=${{ matrix.cxx }}
      - name: Sanitizers (ASan + UBSan)
        run: make -C scilex sanitize CXX=${{ matrix.cxx }}

  # Portable build entry: Windows/MSVC and native ARM, through CMake — plus a
  # find_package smoke proving the installed config package and its transitive
  # REAL dependency. Mirrors posix's sibling checkout so configure resolves deps.
  cmake:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest    # MSVC
          - os: ubuntu-24.04-arm  # native AArch64
          - os: ubuntu-latest     # x86-64, sanity for the CMake path
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-regex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/sciforge
          ref: v2026.6.2
          path: sciforge
      # One bash script across all three OSes (bash ships on the Windows runner);
      # --config/-C Release cover the multi-config MSVC generator and no-op on
      # the single-config Linux ones.
      - name: Configure, build, test, install and find_package smoke
        shell: bash
        run: |
          set -e
          STAGE="${{ github.workspace }}/_stage"
          # Install REAL first so find_package(scilex) resolves real:: transitively.
          cmake -S real-regex -B real-regex/build -DCMAKE_BUILD_TYPE=Release
          cmake --install real-regex/build --config Release --prefix "$STAGE"
          # Build, test and install SciLex itself (configure uses the sibling path).
          cmake -S scilex -B scilex/build -DCMAKE_BUILD_TYPE=Release
          cmake --build scilex/build --config Release
          ctest --test-dir scilex/build -C Release --output-on-failure
          cmake --install scilex/build --config Release --prefix "$STAGE"
          # Downstream consumer: locate SciLex purely via find_package.
          cmake -S scilex/cmake/smoke -B scilex/build-smoke -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$STAGE"
          cmake --build scilex/build-smoke --config Release
          ctest --test-dir scilex/build-smoke -C Release --output-on-failure

  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # macOS dropped (local platform); the lexer binding has no platform-specific interop
        python: ['3.10', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-regex
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Build the binding and run the suite
        working-directory: scilex
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m unittest discover -s python/tests
