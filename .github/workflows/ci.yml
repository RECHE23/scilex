name: CI

# SciLex depends on REAL's headers. CI checks out REAL (public) as a sibling so
# the Makefile's default resolution (../real-v1/include) finds it — no secret needed.
#
# Actions-minute economy (this is a private repo, so minutes are billed, and macOS
# runners bill 10x): macOS is the maintainer's local development platform — every gate
# runs there via `make full-local-gate` on each slice — so CI deliberately omits macOS
# and covers the *non-local* platforms instead: Linux (clang + g++-14), Windows/MSVC
# and ARM. Run on main only (plus PRs); workflow_dispatch is available for ad-hoc runs.
# Doc-only pushes are skipped. Coverage is a local gate (Apple-clang llvm-cov); not here.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
  workflow_dispatch:

jobs:
  # Formatting gate: the whole C++ codebase is formatted with Uncrustify 0.82.0.
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The pinned Uncrustify binary never changes, so cache it (keyed by version)
      # and rebuild from source only on a cache miss — saving the ~3-minute build
      # on every subsequent run.
      - name: Cache Uncrustify 0.82.0
        id: uncrustify
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/uncrustify
          key: uncrustify-0.82.0-${{ runner.os }}
      - name: Build Uncrustify 0.82.0
        if: steps.uncrustify.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake build-essential
          curl -L -o uncrustify-src.tar.gz https://github.com/uncrustify/uncrustify/releases/download/uncrustify-0.82.0/uncrustify-0.82.0.tar.gz
          tar -xzf uncrustify-src.tar.gz
          cd uncrustify-uncrustify-0.82.0
          mkdir build && cd build
          cmake .. && cmake --build . -j
          mkdir -p "$HOME/.local/bin" && cp uncrustify "$HOME/.local/bin/"
      - name: Check formatting
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make format-check

  # POSIX developer workflow: the Makefile, both compilers, plus sanitizers.
  posix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cxx: g++-14 }
          - { os: ubuntu-latest, cxx: clang++ }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex-v1
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-v1
      - name: Test
        run: make -C scilex-v1 test CXX=${{ matrix.cxx }}
      - name: Sanitizers (ASan + UBSan)
        run: make -C scilex-v1 sanitize CXX=${{ matrix.cxx }}

  # Portable build entry: Windows/MSVC and native ARM, through CMake — plus a
  # find_package smoke proving the installed config package and its transitive
  # REAL dependency. Mirrors posix's sibling checkout so configure resolves deps.
  cmake:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest    # MSVC
          - os: ubuntu-24.04-arm  # native AArch64
          - os: ubuntu-latest     # x86-64, sanity for the CMake path
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex-v1
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-v1
      # One bash script across all three OSes (bash ships on the Windows runner);
      # --config/-C Release cover the multi-config MSVC generator and no-op on
      # the single-config Linux ones.
      - name: Configure, build, test, install and find_package smoke
        shell: bash
        run: |
          set -e
          STAGE="${{ github.workspace }}/_stage"
          # Install REAL first so find_package(scilex) resolves real:: transitively.
          cmake -S real-v1 -B real-v1/build -DCMAKE_BUILD_TYPE=Release
          cmake --install real-v1/build --config Release --prefix "$STAGE"
          # Build, test and install SciLex itself (configure uses the sibling path).
          cmake -S scilex-v1 -B scilex-v1/build -DCMAKE_BUILD_TYPE=Release
          cmake --build scilex-v1/build --config Release
          ctest --test-dir scilex-v1/build -C Release --output-on-failure
          cmake --install scilex-v1/build --config Release --prefix "$STAGE"
          # Downstream consumer: locate SciLex purely via find_package.
          cmake -S scilex-v1/cmake/smoke -B scilex-v1/build-smoke -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$STAGE"
          cmake --build scilex-v1/build-smoke --config Release
          ctest --test-dir scilex-v1/build-smoke -C Release --output-on-failure

  misra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex-v1
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-v1
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy
      - name: MISRA C++:2023-oriented analysis
        run: make -C scilex-v1 misra

  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # macOS dropped (local platform); the lexer binding has no platform-specific interop
        python: ['3.10', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex-v1
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-v1
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Build the binding and run the suite
        working-directory: scilex-v1
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m unittest discover -s python/tests
