name: CI

# SciLex depends on REAL's headers. CI checks out REAL (public) as a sibling so
# the Makefile's default resolution (../real-regex/include) finds it — no secret needed.
#
# Actions-minute economy (this is a private repo, so minutes are billed, and macOS
# runners bill 10x): macOS is the maintainer's local development platform — every gate
# runs there via `make full-local-gate` on each slice — so CI deliberately omits macOS
# and covers the *non-local* platforms instead: Linux (clang + g++-14), Windows/MSVC
# and ARM. Run on main only (plus PRs); workflow_dispatch is available for ad-hoc runs.
# Doc-only pushes are skipped. Coverage is a local gate (Apple-clang llvm-cov); not here.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
  workflow_dispatch:

jobs:
  # Lint (format + MISRA) via SciForge's reusable spine: pins clang-tidy-18 and runs
  # this repo's make format-check / misra against the shared lint/ config. SciLex's
  # MISRA TU needs REAL's headers, so real-regex is checked out as a dep sibling.
  lint:
    uses: RECHE23/sciforge/.github/workflows/lint-cpp.yml@v2026.7.3
    with:
      deps: '[{"repo":"RECHE23/real-regex","path":"real-regex"}]'
      sciforge-ref: v2026.7.3
      runner-mode: hosted

  # POSIX + CMake build via SciForge's reusable build spine: the Makefile under
  # g++-14 + clang++ with sanitizers (Linux baseline), and CMake configure/build/
  # test/install + find_package smoke across linux-x64, Windows/MSVC and native ARM
  # — matching SciLex's prior coverage exactly. The single REAL dependency (public,
  # so no ci-pat) is installed first so find_package(scilex) resolves real::.
  build:
    uses: RECHE23/sciforge/.github/workflows/build-cpp.yml@v2026.7.3
    with:
      deps: '[{"repo":"RECHE23/real-regex","path":"real-regex"}]'
      sciforge-ref: v2026.7.3
      runner-mode: hosted
      enable-windows-msvc: true
      enable-arm: true

  # Python binding (abi3) build + unittest via SciForge's reusable spine. The lexer
  # binding has no platform-specific interop, so Linux suffices (matching the prior
  # coverage: linux x {3.10, 3.14}). It compiles against REAL's headers, passed as a
  # dependency sibling (public, so no ci-pat).
  python:
    uses: RECHE23/sciforge/.github/workflows/python-cpp.yml@v2026.7.3
    with:
      python-versions: '["3.10","3.14"]'
      sciforge-ref: v2026.7.3
      deps: '[{"repo":"RECHE23/real-regex","path":"real-regex"}]'
      runner-mode: hosted

  # Exhaustive lexer-oracle net, promoted from the local gate now that the enumerator substrate is
  # pinnable: scilex::lexer vs reference.hpp over every small rule-set x input, under both error policies.
  # Also runs the pin-drift lint on this repo's workflows. REAL (headers, at its default branch — the
  # sibling-consumption model this repo already uses) and SciForge (framework + enumerator, at the pinned
  # tag) are checked out as siblings; the PR tier is ~10 s.
  exhaustive-lex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: scilex
      - uses: actions/checkout@v4
        with:
          repository: RECHE23/real-regex
          path: real-regex
      - uses: actions/checkout@v4
        with:
          repository: RECHE23/sciforge
          ref: v2026.7.3
          path: sciforge
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install cmake + clang
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - name: Pin-drift lint (SciForge pins consistent)
        run: bash sciforge/tools/check-pins.sh scilex
      - name: Exhaustive lexer-oracle check (scilex::lexer vs reference.hpp)
        run: make -C scilex exhaustive-lex
