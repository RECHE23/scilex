name: Release

# Build the wheels + sdist and publish to PyPI when a version tag is pushed.
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token is stored.
# One-time PyPI setup (Trusted Publisher) is documented in README.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  # Guard: the tag must match the version declared in pyproject.toml.
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          proj=$(grep -E '^version *=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$tag pyproject=$proj"
          test "$tag" = "$proj" || { echo "::error::tag v$tag != pyproject version $proj"; exit 1; }

  wheels:
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # manylinux x86_64
          - os: ubuntu-24.04-arm   # manylinux aarch64 (native)
          - os: macos-latest       # universal: x86_64 + arm64
          - os: windows-latest     # amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build wheels (cibuildwheel, abi3 cp310)
        run: pipx run cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_MACOS: "x86_64 arm64"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # Only publish on an actual tag push, not manual dry-runs.
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@v1.14.0

  # Populate the GitHub /releases page for the tag: auto-generated notes plus the
  # built wheels + sdist attached as downloadable assets. Runs after publish, so a
  # Release only appears for a version that actually shipped to PyPI (which stays
  # the source of truth). Applies to future tags; existing tags are not back-filled.
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create the Release for the tag
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create the GitHub Release (auto notes + wheel/sdist assets)
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag dist/*
        env:
          GH_TOKEN: ${{ github.token }}
