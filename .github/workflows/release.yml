name: Release

# Build the wheels + sdist and publish to PyPI when a version tag is pushed.
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token is stored.
# One-time PyPI setup (Trusted Publisher) is documented in README.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  # Build the wheels (cibuildwheel abi3 across 4 OS) + sdist via SciForge's reusable
  # build-only spine (it also guards tag == pyproject version), uploading them as
  # artifacts. Inputs carry SciLex's exact cibuildwheel config. cibuildwheel pulls
  # REAL from PyPI (build-system.requires real-regex>=...) at wheel-build time.
  # Publishing + docs stay below, in this repo, so the OIDC identity matches the
  # PyPI trusted-publisher.
  build:
    uses: RECHE23/sciforge/.github/workflows/build-wheels.yml@v2026.7.3
    with:
      wheel-os: '["ubuntu-latest","ubuntu-24.04-arm","macos-latest","windows-latest"]'
      cibw-archs-macos: "x86_64 arm64"

  # Build the full API reference (Doxygen + embedded coverage + the guided tour) and
  # carry it as an artifact for the GitHub Release. SciLex compiles against REAL's
  # headers, so REAL is checked out as a sibling (mirroring ci.yml) for the coverage
  # build that `make doc` runs.
  docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: scilex
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/real-regex
          path: real-regex
      # The coverage build that `make doc` runs needs the SciForge test harness
      # (<sciforge/test/framework.hpp>), resolved as the ../sciforge sibling —
      # mirroring docs.yml in REAL. (Without it the configure step fails.)
      - uses: actions/checkout@v6
        with:
          repository: RECHE23/sciforge
          ref: v2026.7.3
          path: sciforge
      - name: Install Doxygen, Graphviz, Clang and LLVM coverage tools
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz clang llvm
      - name: Build the API reference (Doxygen + embedded coverage + guided tour)
        run: make -C scilex doc
      - name: Package the HTML
        run: tar -czf scilex-doc.tar.gz -C scilex/build/doc html
      - uses: actions/upload-artifact@v7
        with:
          name: docs
          path: scilex-doc.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on an actual tag push, not manual dry-runs.
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "{wheels-*,sdist}"   # only the distributions — never the docs artifact
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@v1.14.0

  # Populate the GitHub /releases page for the tag: auto-generated notes plus the
  # built wheels + sdist + the API-reference tarball (scilex-doc.tar.gz) attached as
  # downloadable assets. Runs after publish, so a Release only appears for a version
  # that actually shipped to PyPI (which stays the source of truth). Applies to future
  # tags; existing tags are not back-filled. The unfiltered download grabs every
  # artifact (wheels, sdist, docs), so `dist/*` attaches them all.
  github-release:
    needs: [publish, docs]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create the Release for the tag
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create the GitHub Release (auto notes + wheels, sdist, docs assets)
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag dist/*
        env:
          GH_TOKEN: ${{ github.token }}
