# REAL Code Formatting Configuration — Uncrustify
#
# C/C++ style adopted for the REAL project (regular-expression algorithmic
# library). Derived from an earlier GIREF configuration, translated and adapted
# to match REAL's 2-space indentation.

# ==============================================================================
# GENERAL - Base parameters
# ==============================================================================

# Input/output tab size (2 spaces)
input_tab_size                                = 2
output_tab_size                               = 2

# Indentation with spaces only (no tabs)
indent_with_tabs                              = 0

# Width of one indentation level: 2 spaces
indent_columns                                = 2

# Force a trailing newline at end of file (at least one)
nl_end_of_file                                = force
nl_end_of_file_min                            = 1

# Remove blank lines before a closing brace
eat_blanks_before_close_brace                 = true

# Remove superfluous semicolons
mod_remove_extra_semicolon                    = true

# ==============================================================================
# OPERATORS AND EXPRESSIONS
# ==============================================================================

# Spacing around assignment operators (=, +=, etc.)
sp_assign                                     = add
sp_before_assign                              = add
sp_after_assign                               = add

# Spacing around arithmetic operators (+, -, *, /, %)
sp_arith                                      = add

# Spacing around boolean operators (&&, ||)
sp_bool                                       = add

# Spacing around comparison operators (==, !=, <, >, etc.)
sp_compare                                    = add

# Spacing around the ternary operator (? :)
sp_cond_question                              = add
sp_cond_colon                                 = add

# Indentation of the 2nd/3rd operands of the ternary operator
indent_ternary_operator                       = 1

# Alignment of consecutive assignments across multiple lines
align_assign_span                             = 1
align_on_operator                             = true

# Remove spacing for these operators
sp_addr                                       = remove   # address-of operator &
sp_deref                                      = remove   # dereference operator *
sp_incdec                                     = remove   # ++ and -- operators

# Preserve original spacing for these operators
sp_inv                                        = ignore   # bitwise-not operator ~
sp_not                                        = ignore   # logical-not operator !
sp_sign                                       = ignore   # unary + and - signs
sp_member                                     = ignore   # member access . and ->

# ==============================================================================
# COMMAS AND SEMICOLONS
# ==============================================================================

# Space after commas
sp_after_comma                                = add
sp_after_semi_for                             = add      # inside for loops

# Preserve original spacing
sp_before_comma                               = ignore
sp_paren_comma                                = ignore   # comma after parenthesis
sp_before_semi                                = ignore   # before semicolon
sp_after_semi                                 = ignore   # after semicolon

# ==============================================================================
# PARENTHESES AND BRACES
# ==============================================================================

# Space between closing parenthesis and opening brace: func() {
sp_paren_brace                                = force

# Space around control parentheses: if (), while (), for ()
sp_before_sparen                              = force
sp_after_sparen                               = add

# Space between control parenthesis and brace: if (...) {
sp_sparen_brace                               = force

# Space between else and brace: } else {
sp_else_brace                                 = force
nl_brace_else                                 = force

# Preserve original spacing for enums
sp_enum_brace                                 = force

# ==============================================================================
# FUNCTIONS - Declarations and definitions
# ==============================================================================

# No space between function name and parenthesis: func()
sp_func_def_paren                             = remove

# Newline before the opening brace of a function definition
nl_fdef_brace                                 = force

# Function arguments on separate lines
nl_func_decl_args                             = force
nl_func_def_args                              = force

# Blank line between a function definition and the preceding comment
nl_comment_func_def                           = 1

# 1 blank line after a function body
nl_after_func_body                            = 2

# Alignment of function parameters
align_func_params                             = true
align_func_params_span                        = 3

# Alignment of function prototypes
align_func_proto_span                         = 3

# ==============================================================================
# COMMENTS
# ==============================================================================

# Indent block comments that start in the first column so they line up with the
# code they document (needed for /*! */ Doxygen banners above classes/methods).
indent_col1_comment                           = true

# Indent access specifiers (public/private/protected) at the class/struct level.
# A negative value aligns them with the enclosing class indentation.
indent_access_spec                            = -2

# ==============================================================================
# CLASSES AND STRUCTURES
# ==============================================================================

# Indent class bodies
indent_class                                  = true

# Indent after inheritance colons
indent_class_colon                            = true

# 1 blank line after a class declaration
nl_after_class                                = 2

# Blank lines before/after access specifiers (public, private, protected)
nl_before_access_spec                         = 2
nl_after_access_spec                          = 2

# ==============================================================================
# CONSTRUCTORS AND INITIALIZERS
# ==============================================================================

# Indent after the colon of a member initializer list
indent_constr_colon                           = true

# Space after the constructor colon
sp_after_constr_colon                         = force

# Preserve original spacing before the constructor colon
sp_before_constr_colon                        = ignore

# Alignment of braced initializer lists
align_braced_init_list_span                   = 2

# ==============================================================================
# NAMESPACES
# ==============================================================================

# Indent namespace contents
indent_namespace                              = true
indent_namespace_level                        = 2

# Force spacing for namespace {
sp_word_brace_ns                              = force

# ==============================================================================
# SWITCH/CASE
# ==============================================================================

# Indentation of case labels inside a switch
indent_switch_case                            = 2

# Indentation of braces inside a case
indent_case_brace                             = 2

# Remove spacing before the colon of a case label
sp_before_case_colon                          = remove

# ==============================================================================
# TEMPLATES AND ANGLE BRACKETS
# ==============================================================================

# Remove space in >> for C++11 templates
sp_angle_shift                                = remove
sp_permit_cpp11_shift                         = true

# Preserve original spacing inside angle brackets
sp_inside_angle                               = ignore

# ==============================================================================
# C++ LAMBDAS
# ==============================================================================

# Indent lambda bodies
indent_cpp_lambda_body                        = true

# Keep simple lambdas on a single line
nl_cpp_lambda_leave_one_liners                = true

# ==============================================================================
# TYPEDEF
# ==============================================================================

# Alignment of typedef declarations
align_typedef_span                            = 3

# Blank lines around typedef blocks
nl_typedef_blk_start                          = 1
nl_typedef_blk_end                            = 1
nl_typedef_blk_in                             = 1

# ==============================================================================
# VARIABLES
# ==============================================================================

# Alignment of variable definitions
align_var_def_span                            = 1
align_var_def_star_style                      = 2   # align * with the type

# Alignment inside classes and structs
align_var_class_span                          = 1
align_var_struct_span                         = 1

# Blank lines inside variable-definition blocks
nl_var_def_blk_in                             = 1

# Preserve original spacing before array brackets
sp_before_vardef_square                       = ignore

# ==============================================================================
# COMMENTS
# ==============================================================================

# Space before end-of-line comments
sp_before_tr_cmt                              = add
sp_num_before_tr_cmt                          = 1

# Alignment of end-of-line comments
align_right_cmt_span                          = 4
align_right_cmt_gap                           = 1
align_right_cmt_same_level                    = true

# Spacing of embedded /* ... */ comments
sp_before_emb_cmt                             = add
sp_after_emb_cmt                              = add

# ==============================================================================
# PREPROCESSOR AND MACROS
# ==============================================================================

# Preserve spacing for token-pasting ##
sp_pp_concat                                  = ignore

# Preserve spacing before line-continuation
sp_before_nl_cont                             = ignore

# ==============================================================================
# MISCELLANEOUS
# ==============================================================================

# Spacing after return, this(), super()
sp_return                                     = force
sp_this_paren                                 = ignore
sp_super_paren                                = ignore

# Space after the type in declarations
sp_after_type                                 = add

# Keep intentional extra spaces
align_keep_extra_space                        = true

# Collapse empty bodies: func() {}
nl_collapse_empty_body                        = true
